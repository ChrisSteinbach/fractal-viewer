name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Check formatting
        run: npm run format

      - name: Lint JS/TS
        run: npm run lint:eslint

      - name: Lint CSS
        run: npm run lint:stylelint

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Production build
        run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 30

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # playwright-core (the only Playwright package here) exposes the
      # `playwright-core` bin, NOT `playwright`; using `npx playwright` would
      # auto-fetch an unpinned full package. --with-deps adds the browser's
      # OS libraries (SwiftShader/ANGLE ship inside the bundled Chromium).
      - name: Install Playwright Chromium + system deps
        run: npx playwright-core install --with-deps chromium

      # scripts/webgl-smoke.mjs spawns its own `npm run dev` and tears it down.
      - name: WebGL smoke test (SwiftShader software GL)
        run: npm run smoke
