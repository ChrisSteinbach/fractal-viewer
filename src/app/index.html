<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <title>Fractal Viewer</title>
    <meta
      name="description"
      content="Interactive 3D IFS fractal viewer — design iterated function systems and watch the chaos game render their attractors in real time."
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="container"></div>
    <div id="error"></div>
    <div id="loading">Loading…</div>

    <div id="help">
      <div class="title" id="helpTitle">Camera Mode</div>
      <div id="helpText">
        <div>1 finger: Rotate</div>
        <div>2 fingers: Pan/Zoom</div>
      </div>
      <div class="points" id="pointCount">0 pts</div>
    </div>

    <button id="menuToggle" type="button" aria-label="Toggle controls">
      ☰
    </button>
    <div id="backdrop"></div>

    <div id="panel">
      <button id="panelClose" type="button" aria-label="Close controls">
        ✕
      </button>
      <h2>3D IFS Fractal</h2>

      <h3>Transforms (<span id="transformCount">4</span>)</h3>
      <div class="btn-row">
        <button class="btn btn-green" id="addBtn" type="button">+ Add</button>
        <button class="btn btn-red" id="removeBtn" type="button">
          − Remove
        </button>
      </div>

      <h3>Presets</h3>
      <button class="btn btn-purple" id="sierpinskiBtn" type="button">
        Sierpinski Tetrahedron
      </button>
      <button class="btn btn-purple" id="mengerBtn" type="button">
        Menger Sponge
      </button>
      <button class="btn btn-purple" id="spiralBtn" type="button">
        Spiral
      </button>

      <h3>Points: <span id="numPointsLabel">100,000</span></h3>
      <input
        type="range"
        id="numPointsSlider"
        min="0"
        max="500000"
        step="5000"
        value="100000"
      />
      <button class="btn btn-blue" id="regenerateBtn" type="button">
        Regenerate Points
      </button>

      <h3>Point Size: <span id="pointSizeLabel">1.00×</span></h3>
      <input
        type="range"
        id="pointSizeSlider"
        min="0.25"
        max="4"
        step="0.05"
        value="1"
      />

      <h3>Display Options</h3>
      <label class="checkbox-label">
        <input type="checkbox" id="showGuides" checked />
        Show Guides
      </label>

      <label class="select-label">
        Color Mode
        <select id="colorMode">
          <option value="transform">By Transform</option>
          <option value="height">By Height (terrain)</option>
          <option value="radius">By Radius (warm→cool)</option>
          <option value="position">By Position (XYZ→RGB)</option>
          <option value="iterationAge">By Iteration Age</option>
          <option value="uniform">Uniform Cyan</option>
        </select>
      </label>

      <label class="select-label">
        Depth Style
        <select id="renderStyle">
          <option value="depthFade">Depth Fade (current)</option>
          <option value="aerial">Aerial Haze</option>
          <option value="glow">Glow + Bloom</option>
          <option value="dof">Depth of Field</option>
          <option value="edl">Eye-Dome Lighting</option>
        </select>
      </label>

      <label class="checkbox-label">
        <input type="checkbox" id="autoUpdate" checked />
        Auto-update on change
      </label>

      <h3>Select to Edit</h3>
      <div class="transform-list" id="transformList"></div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
